name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m py_compile push_kernel.py
      - run: python3 -c "import json; m=json.load(open('kernel-metadata.json')); assert all(r in m for r in ['id','title','code_file','language','kernel_type']); assert m['code_file'].endswith('.ipynb'); print('metadata OK')"
